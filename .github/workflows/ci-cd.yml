name: CI/CD Fraud API

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-api.txt
          pip install pytest httpx

      - name: Run tests
        run: |
          PYTHONPATH=. python -m pytest -q tests

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs:
      - test

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image name
        id: image
        run: |
          REPOSITORY_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${REGISTRY}/${REPOSITORY_LOWER}:${GITHUB_SHA}"
          LATEST_IMAGE="${REGISTRY}/${REPOSITORY_LOWER}:latest"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "LATEST_IMAGE=${LATEST_IMAGE}" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.LATEST_IMAGE }}

  deploy:
    name: Deploy to Yandex Managed Kubernetes
    runs-on: ubuntu-latest
    needs:
      - build-and-push

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      YC_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.YC_SERVICE_ACCOUNT_KEY_JSON }}
      YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
      YC_K8S_CLUSTER_ID: ${{ secrets.YC_K8S_CLUSTER_ID }}
      IMAGE: ${{ needs.build-and-push.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Configure Yandex Cloud CLI
        run: |
          echo "${YC_SERVICE_ACCOUNT_KEY_JSON}" > key.json
          yc config profile create ci-profile
          yc config set service-account-key key.json
          yc config set cloud-id "${YC_CLOUD_ID}"
          yc config set folder-id "${YC_FOLDER_ID}"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Get Kubernetes credentials
        run: |
          yc managed-kubernetes cluster get-credentials \
            --id "${YC_K8S_CLUSTER_ID}" \
            --external \
            --force

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml

          if kubectl get secret fraud-api-secret -n fraud-detection >/dev/null 2>&1; then
            echo "Secret fraud-api-secret already exists"
          else
            echo "Secret fraud-api-secret does not exist. Create it manually before first deploy."
            exit 1
          fi

          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Update image
        run: |
          kubectl set image deployment/fraud-api \
            fraud-api="${IMAGE}" \
            -n fraud-detection

          kubectl rollout status deployment/fraud-api -n fraud-detection
